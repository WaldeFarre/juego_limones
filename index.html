<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LEMON·BOY — Atrapar Limones</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="limones_retro.css"/>
  <script src="utilis.js"></script>
</head>
<body onload="iniciar()">

  <main class="consola">
    <!-- tornillos -->
    <span class="tornillo tornillo--tl" aria-hidden="true"></span>
    <span class="tornillo tornillo--tr" aria-hidden="true"></span>
    <span class="tornillo tornillo--bl" aria-hidden="true"></span>
    <span class="tornillo tornillo--br" aria-hidden="true"></span>

    <!-- barra superior -->
    <div class="barra-top">
      <span class="marca">LEMON<span class="punto">·</span>BOY</span>
      <div class="estado">
        <span class="power">
          <span class="led" aria-hidden="true"></span>
          <span class="power-txt">POWER</span>
        </span>
        <span class="rejilla" aria-hidden="true"></span>
      </div>
    </div>

    <!-- pantalla -->
    <div class="pantalla">
      <div class="pantalla-top">
        <h1 class="titulo">▸ ATRAPAR LIMONES</h1>
      </div>
      <div class="crt">
        <canvas id="areaJuego" width="800" height="400"></canvas>
      </div>
    </div>

    <div class="deco-line">
      <span class="texto">CITRUS DOT MATRIX</span>
      <span class="rayas" aria-hidden="true"></span>
    </div>

    <!-- marcador LCD -->
    <section class="panel-lcd" aria-label="Marcador">
      <div class="lcd">
        <span class="lcd-label">SCORE</span>
        <span class="lcd-valor" id="txtPuntaje">0</span>
      </div>
      <div class="lcd">
        <span class="lcd-label">LIVES</span>
        <span class="lcd-valor" id="txtVidas">3</span>
      </div>
    </section>

    <!-- controles -->
    <div class="controles">
      <div class="dpad" role="group" aria-label="Movimiento">
        <span class="dpad-v" aria-hidden="true"></span>
        <span class="dpad-h" aria-hidden="true"></span>
        <span class="dpad-centro" aria-hidden="true"></span>
        <button class="dpad-btn dpad-izq" onclick="moverIzquierda()" aria-label="Mover a la izquierda">◀</button>
        <button class="dpad-btn dpad-der" onclick="moverDerecha()" aria-label="Mover a la derecha">▶</button>
      </div>

      <div class="acciones">
        <div class="par-boton">
          <button class="btn-accion" onclick="reiniciar()" aria-label="Reiniciar">A</button>
          <span class="etiqueta">REINICIAR</span>
        </div>
        <div class="par-boton">
          <button class="btn-accion" onclick="probarAleatorio()" aria-label="Probar aleatorio">B</button>
          <span class="etiqueta">PROBAR</span>
        </div>
      </div>
    </div>

    <!-- barra inferior -->
    <div class="barra-bot">
      <span class="firma">AUTOR: WF<br/>MOD. CTS-01 · ©84</span>
      <span class="altavoz" aria-hidden="true"></span>
    </div>
  </main>

  <script src="limones.js"></script>
</body>
</html>
